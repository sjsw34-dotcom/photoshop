<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="스크린샷 자리표시자">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect x="40" y="40" width="1520" height="60" rx="12" fill="rgba(255,255,255,0.06)"/>
  <circle cx="80" cy="70" r="8" fill="#f97316"/>
  <circle cx="108" cy="70" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="136" cy="70" r="8" fill="rgba(255,255,255,0.2)"/>
  <rect x="200" y="55" width="300" height="30" rx="6" fill="rgba(255,255,255,0.08)"/>
  <g transform="translate(800, 500)" text-anchor="middle">
    <rect x="-240" y="-110" width="480" height="220" rx="24" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="2"/>
    <text y="-10" font-family="Pretendard, system-ui, sans-serif" font-size="44" font-weight="700" fill="#f8fafc">포토샵 스크린샷</text>
    <text y="44" font-family="Pretendard, system-ui, sans-serif" font-size="24" fill="rgba(248,250,252,0.7)">자리표시자 이미지입니다</text>
  </g>
</svg>
